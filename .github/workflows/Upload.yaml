name: Deploy to Itch.io

on:
  push:
    branches: [ Development ]

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Deploy to Itch.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the Unity build from the Build workflow
      - name: Download Build Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Build.yml
          workflow_search: true
          name: Build-StandaloneWindows64
          path: build/StandaloneWindows64
          workflow_conclusion: success
          allow_forks: true

      # Zip the Unity build
      - name: Zip Build
        run: |
          cd build/StandaloneWindows64
          zip -r ../../Game.zip .
          cd ../..

      # Install Butler
      - name: Install Butler
        run: |
          curl -L https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip -o butler.zip
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/butler


      # Deploy to Itch.io
      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler login
          butler push Game.zip moontalesstudio/spooky-game:windows

      # Pray that it works
