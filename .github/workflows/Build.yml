name: Build project

on: pull_request

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          #- WebGL 

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
      
      - name: Upload build artifact (attempt 1)
        id: upload_artifact_attempt_1
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          overwrite: true
          compression-level: 0

      - name: Upload build artifact (retry)
        if: steps.upload_artifact_attempt_1.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          overwrite: true
          compression-level: 0
  ## The dreaded mac build...
  buildForMac:
    name: Build for StandaloneOSX
    if: github.base_ref == 'main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-StandaloneOSX
          restore-keys: Library-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneOSX
      - name: Upload build artifact (attempt 1)
        id: upload_artifact_attempt_1
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Build-StandaloneOSX
          path: build/StandaloneOSX
          overwrite: true
          compression-level: 0
      - name: Upload build artifact (retry)
        if: steps.upload_artifact_attempt_1.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: Build-StandaloneOSX
          path: build/StandaloneOSX
          overwrite: true
          compression-level: 0
